                                            <div className="flex justify-between items-center pb-2 border-b border-gray-200">
                                                <span className="text-sm text-gray-600">Total Pengeluaran (-):</span>
                                                <span className="font-bold text-red-500">-{formatRupiah(financeStats.siang.pengeluaran)}</span>
                                            </div>
                                            
                                            <div className="flex justify-between items-center pt-1">
                                                <span className="text-sm font-bold text-gray-800">Pendapatan Bersih (Tunai):</span>
                                                <span className={`font-black text-lg ${financeStats.siang.bersihTunai < 0 ? 'text-red-600' : 'text-green-600'}`}>{formatRupiah(financeStats.siang.bersihTunai)}</span>
                                            </div>
                                            
                                            <div className="flex justify-between items-center pt-3 mt-3 border-t border-gray-200">
                                                <span className="text-sm text-gray-600">Selisih Tambahan (+):</span>
                                                <input disabled={!canEditFinancePagi} type="number" value={dailyFinance.selisihTambahanSiang || ''} onChange={(e) => setDailyFinance(prev => ({...prev, selisihTambahanSiang: Number(e.target.value)}))} className="w-32 px-2 py-1 border border-gray-300 rounded text-right text-sm focus:border-orange-500 outline-none font-bold disabled:bg-gray-100" placeholder="0"/>
                                            </div>
                                        </div>
                                    </div>
                                    
                                    {/* Bawah: Uang Fisik & Status Selisih */}
                                    <div className="p-5 bg-white flex flex-col lg:flex-row items-center gap-4">
                                        <div className="flex-1 w-full">
                                            <label className="block text-xs font-bold text-gray-500 mb-1 uppercase tracking-wider">Hitung Uang Fisik di Laci</label>
                                            <div className="flex gap-2">
                                                <input disabled={!canEditFinancePagi} type="number" value={dailyFinance.uangLaciSiang || ''} onChange={(e) => setDailyFinance(prev => ({...prev, uangLaciSiang: Number(e.target.value)}))} className="w-full p-3 text-xl font-bold text-gray-800 border-2 border-gray-200 rounded-xl focus:border-orange-500 outline-none disabled:bg-gray-100" placeholder="0"/>
                                                {canEditFinancePagi && <button onClick={() => saveFinanceToDb('SIANG')} className="bg-gray-800 hover:bg-gray-900 text-white font-bold px-5 rounded-xl flex items-center gap-2"><Icon name="save" className="w-5 h-5"/> Simpan</button>}
                                            </div>
                                        </div>
                                        <div className={`p-4 rounded-xl w-full lg:w-5/12 border ${financeStats.siang.selisih === 0 ? 'bg-green-50 border-green-200 text-green-700' : financeStats.siang.selisih < 0 ? 'bg-red-50 border-red-200 text-red-700' : 'bg-blue-50 border-blue-200 text-blue-700'}`}>
                                            <p className="text-xs font-bold mb-1">Selisih Akhir</p>
                                            <h3 className="text-2xl font-black">{financeStats.siang.selisih > 0 ? '+' : ''}{formatRupiah(financeStats.siang.selisih)}</h3>
                                            <p className="text-[10px] mt-1 opacity-80 leading-tight">Uang Laci - (Pendapatan Bersih + Selisih Tambahan)</p>
                                        </div>
                                    </div>
                                </div>

                                {/* SESI SIANG (Internal: MALAM) */}
                                <div className="bg-white rounded-2xl shadow-sm border border-gray-100 overflow-hidden">
                                    <div className="bg-gradient-to-r from-orange-500 to-yellow-500 p-4 sm:p-5 text-white flex justify-between items-center">
                                        <h2 className="text-xl font-bold flex items-center gap-2"><Icon name="sun" /> Keuangan: Sesi Siang</h2>
                                    </div>

                                    <div className="flex flex-col lg:flex-row border-b border-gray-100">
                                        {/* Kiri: Menu Income & Pengeluaran */}
                                        <div className="p-5 lg:w-1/2 border-b lg:border-b-0 lg:border-r border-gray-100 space-y-6">
                                            <div>
                                                <h3 className="font-bold text-gray-700 mb-3 flex items-center gap-2"><Icon name="pie-chart" className="w-4 h-4"/> Rincian Penjualan Menu</h3>
                                                <div className="space-y-1.5 bg-gray-50 p-3 rounded-xl border border-gray-100 text-sm">
                                                    {Object.keys(financeStats.malam.menuIncome).length === 0 && <p className="text-gray-400 italic">Belum ada penjualan menu.</p>}
                                                    {Object.entries(financeStats.malam.menuIncome).map(([name, total], idx) => (
                                                        <div key={idx} className="flex justify-between items-center">
                                                            <span className="text-gray-600">{name}</span>
                                                            <span className="font-bold text-gray-800">{formatRupiah(total)}</span>
                                                        </div>
                                                    ))}
                                                </div>
                                            </div>
                                            
                                            <div>
                                                <h3 className="font-bold text-gray-700 mb-3 flex items-center gap-2"><Icon name="receipt" className="w-4 h-4"/> Rincian Pengeluaran</h3>
                                                {canEditFinanceSiang && (
                                                    <form className="flex gap-2 mb-4" onSubmit={(e) => { e.preventDefault(); handleAddExpense('MALAM'); }}>
                                                        <input type="text" placeholder="Keterangan..." value={expenseInputs.MALAM.ket} onChange={e=>setExpenseInputs(prev=>({...prev, MALAM: {...prev.MALAM, ket: e.target.value}}))} className="w-full px-3 py-2 border rounded-lg text-sm outline-none focus:border-indigo-500"/>
                                                        <input type="number" placeholder="Biaya (Rp)" value={expenseInputs.MALAM.biaya} onChange={e=>setExpenseInputs(prev=>({...prev, MALAM: {...prev.MALAM, biaya: e.target.value}}))} className="w-32 px-3 py-2 border rounded-lg text-sm outline-none focus:border-indigo-500"/>
                                                        <button type="submit" className="bg-gray-800 text-white p-2 rounded-lg hover:bg-gray-900"><Icon name="plus" className="w-5 h-5"/></button>
                                                    </form>
                                                )}
                                                <div className="space-y-2 max-h-[150px] overflow-y-auto">
                                                    {(!dailyFinance.pengeluaranMalam || dailyFinance.pengeluaranMalam.length === 0) && <p className="text-sm text-gray-400 italic">Belum ada pengeluaran dicatat.</p>}
                                                    {dailyFinance.pengeluaranMalam?.map(exp => (
                                                        <div key={exp.id} className="flex justify-between items-center bg-gray-50 p-2 rounded-lg border border-gray-100">
                                                            <span className="text-sm font-semibold">{exp.ket}</span>
                                                            <div className="flex items-center gap-3">
                                                                <span className="text-sm font-bold text-red-500">-{formatRupiah(exp.biaya)}</span>
                                                                {canEditFinanceSiang && <button onClick={() => handleDeleteExpense('MALAM', exp.id)} className="text-gray-400 hover:text-red-500"><Icon name="x" className="w-4 h-4"/></button>}
                                                            </div>
                                                        </div>
                                                    ))}
                                                </div>
                                            </div>
                                        </div>
                                        
                                        {/* Kanan: Kalkulasi Pendapatan Bersih */}
                                        <div className="p-5 lg:w-1/2 space-y-3 bg-gray-50/50">
                                            {/* Info Total Sesi & QRIS (Informasional) */}
                                            <div className="bg-white p-3 rounded-lg border border-gray-200 mb-4 flex justify-between items-center shadow-sm">
                                                <div>
                                                    <p className="text-xs text-gray-500 font-bold uppercase">Total Penjualan Sesi (Kotor)</p>
                                                    <p className="text-lg font-black text-gray-800">{formatRupiah(financeStats.malam.totalAll)}</p>
                                                </div>
                                                <div className="text-right">
                                                    <p className="text-xs text-blue-500 font-bold uppercase"><Icon name="qr-code" className="w-3 h-3 inline"/> via QRIS</p>
                                                    <p className="text-sm font-bold text-blue-700">{formatRupiah(financeStats.malam.totalQris)}</p>
                                                </div>
                                            </div>

                                            {/* Kalkulasi Kas Laci */}
                                            <div className="flex justify-between items-center">
                                                <span className="text-sm text-gray-600">Pendapatan Tunai (Tanpa QRIS):</span>
                                                <span className="font-bold">{formatRupiah(financeStats.malam.grossCash)}</span>
                                            </div>
                                            <div className="flex justify-between items-center">
                                                <span className="text-sm text-gray-600">Plusan (+):</span>
                                                <input disabled={!canEditFinanceSiang} type="number" value={dailyFinance.plusanMalam || ''} onChange={(e) => setDailyFinance(prev => ({...prev, plusanMalam: Number(e.target.value)}))} className="w-32 px-2 py-1 border border-gray-300 rounded text-right text-sm focus:border-indigo-500 outline-none font-bold disabled:bg-gray-100" placeholder="0"/>
                                            </div>
                                            <div className="flex justify-between items-center pb-2 border-b border-gray-200">
                                                <span className="text-sm text-gray-600">Total Pengeluaran (-):</span>
                                                <span className="font-bold text-red-500">-{formatRupiah(financeStats.malam.pengeluaran)}</span>
                                            </div>
                                            
                                            <div className="flex justify-between items-center pt-1">
                                                <span className="text-sm font-bold text-gray-800">Pendapatan Bersih (Tunai):</span>
                                                <span className={`font-black text-lg ${financeStats.malam.bersihTunai < 0 ? 'text-red-600' : 'text-green-600'}`}>{formatRupiah(financeStats.malam.bersihTunai)}</span>
                                            </div>
                                            
                                            <div className="flex justify-between items-center pt-3 mt-3 border-t border-gray-200">
                                                <span className="text-sm text-gray-600">Selisih Tambahan (+):</span>
                                                <input disabled={!canEditFinanceSiang} type="number" value={dailyFinance.selisihTambahanMalam || ''} onChange={(e) => setDailyFinance(prev => ({...prev, selisihTambahanMalam: Number(e.target.value)}))} className="w-32 px-2 py-1 border border-gray-300 rounded text-right text-sm focus:border-indigo-500 outline-none font-bold disabled:bg-gray-100" placeholder="0"/>
                                            </div>
                                        </div>
                                    </div>
                                    
                                    {/* Bawah: Uang Fisik & Status Selisih */}
                                    <div className="p-5 bg-white flex flex-col lg:flex-row items-center gap-4">
                                        <div className="flex-1 w-full">
                                            <label className="block text-xs font-bold text-gray-500 mb-1 uppercase tracking-wider">Hitung Uang Fisik di Laci</label>
                                            <div className="flex gap-2">
                                                <input disabled={!canEditFinanceSiang} type="number" value={dailyFinance.uangLaciMalam || ''} onChange={(e) => setDailyFinance(prev => ({...prev, uangLaciMalam: Number(e.target.value)}))} className="w-full p-3 text-xl font-bold text-gray-800 border-2 border-gray-200 rounded-xl focus:border-indigo-500 outline-none disabled:bg-gray-100" placeholder="0"/>
                                                {canEditFinanceSiang && <button onClick={() => saveFinanceToDb('MALAM')} className="bg-gray-800 hover:bg-gray-900 text-white font-bold px-5 rounded-xl flex items-center gap-2"><Icon name="save" className="w-5 h-5"/> Simpan</button>}
                                            </div>
                                        </div>
                                        <div className={`p-4 rounded-xl w-full lg:w-5/12 border ${financeStats.malam.selisih === 0 ? 'bg-green-50 border-green-200 text-green-700' : financeStats.malam.selisih < 0 ? 'bg-red-50 border-red-200 text-red-700' : 'bg-blue-50 border-blue-200 text-blue-700'}`}>
                                            <p className="text-xs font-bold mb-1">Selisih Akhir</p>
                                            <h3 className="text-2xl font-black">{financeStats.malam.selisih > 0 ? '+' : ''}{formatRupiah(financeStats.malam.selisih)}</h3>
                                            <p className="text-[10px] mt-1 opacity-80 leading-tight">Uang Laci - (Pendapatan Bersih + Selisih Tambahan)</p>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        )}
                    </main>

                    {/* MODAL PINDAH SESI */}
                    {showSessionModal && (
                        <div className="fixed inset-0 bg-gray-900/60 backdrop-blur-sm flex items-center justify-center p-4 z-50 fade-in">
                            <div className="bg-white rounded-3xl p-6 w-full max-w-sm shadow-2xl text-center">
                                <div className={`w-16 h-16 rounded-full flex items-center justify-center mx-auto mb-4 ${activeSession === 'SIANG' ? 'bg-orange-100 text-orange-600' : 'bg-blue-100 text-blue-600'}`}>
                                    <Icon name={activeSession === 'SIANG' ? 'sun' : 'sunrise'} className="w-8 h-8" />
                                </div>
                                <h3 className="text-xl font-bold text-gray-800 mb-2">
                                    Pindah ke Sesi {activeSession === 'SIANG' ? 'Siang' : 'Pagi'}?
                                </h3>
                                <p className="text-sm text-gray-500 mb-6">
                                    Semua pesanan selanjutnya akan tercatat pada Sesi {activeSession === 'SIANG' ? 'Siang' : 'Pagi'}.
                                </p>
                                
                                <div className="flex gap-3">
                                    <button onClick={() => setShowSessionModal(false)} className="flex-1 bg-gray-100 hover:bg-gray-200 text-gray-700 font-bold py-3 rounded-xl transition">Batal</button>
                                    <button onClick={switchSession} className={`flex-1 text-white font-bold py-3 rounded-xl shadow-md transition ${activeSession === 'SIANG' ? 'bg-gradient-to-r from-orange-400 to-orange-500 hover:from-orange-500' : 'bg-gradient-to-r from-blue-500 to-blue-600 hover:from-blue-600'}`}>
                                        Ya, Pindah
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* MODAL INPUT MANUAL PRICE */}
                    {manualModal.show && (
                        <div className="fixed inset-0 bg-gray-900/60 backdrop-blur-sm flex items-center justify-center p-4 z-50 fade-in">
                            <form onSubmit={submitManualPrice} className="bg-white rounded-3xl p-6 w-full max-w-sm shadow-2xl transform transition-transform">
                                <div className="w-14 h-14 bg-blue-100 text-blue-600 rounded-full flex items-center justify-center mx-auto mb-4">
                                    <Icon name={manualModal.item.icon} className="w-7 h-7" />
                                </div>
                                <h3 className="text-2xl font-bold text-gray-800 text-center mb-1">{manualModal.item.name}</h3>
                                <p className="text-sm text-gray-500 text-center mb-6">Masukkan nominal harga untuk pesanan ini</p>
                                
                                <div className="relative mb-6">
                                    <span className="absolute left-4 top-1/2 transform -translate-y-1/2 font-bold text-gray-500">Rp</span>
                                    <input 
                                        id="manualPriceInput"
                                        type="number" 
                                        value={manualPriceInput}
                                        onChange={(e) => setManualPriceInput(e.target.value)}
                                        placeholder="0"
                                        className="w-full pl-12 pr-4 py-4 bg-gray-50 border-2 border-gray-200 rounded-2xl focus:ring-0 focus:border-blue-500 outline-none transition text-2xl font-black text-gray-800"
                                    />
                                </div>

                                <div className="flex gap-3">
                                    <button type="button" onClick={() => setManualModal({show: false, item: null})} className="flex-1 bg-gray-100 hover:bg-gray-200 text-gray-700 font-bold py-3.5 rounded-xl transition">Batal</button>
                                    <button type="submit" className="flex-[2] bg-blue-600 hover:bg-blue-700 text-white font-bold py-3.5 rounded-xl shadow-md transition">Tambahkan</button>
                                </div>
                            </form>
                        </div>
                    )}

                    {/* MODAL EXPORT OPTIONS */}
                    {showExportModal && (
                        <div className="fixed inset-0 bg-gray-900/60 backdrop-blur-sm flex items-center justify-center p-4 z-50 fade-in">
                            <div className="bg-white rounded-3xl p-6 w-full max-w-sm shadow-2xl text-center">
                                <div className="w-16 h-16 bg-green-100 text-green-600 rounded-full flex items-center justify-center mx-auto mb-4">
                                    <Icon name="download" className="w-8 h-8" />
                                </div>
                                <h3 className="text-xl font-bold text-gray-800 mb-2">Ekspor Laporan (Excel)</h3>
                                <p className="text-sm text-gray-500 mb-6">Unduh seluruh riwayat transaksi (Maksimal 7 hari terakhir).</p>
                                
                                <div className="flex flex-col gap-3">
                                    <button onClick={() => exportToCSV()} className="w-full bg-green-600 hover:bg-green-700 text-white font-bold py-3 rounded-xl shadow-md transition flex justify-center items-center gap-2">
                                        <Icon name="database" className="w-5 h-5"/> Unduh Data Laporan
                                    </button>
                                    <button onClick={() => setShowExportModal(false)} className="w-full bg-gray-100 hover:bg-gray-200 text-gray-700 font-bold py-3 rounded-xl transition mt-2">
                                        Batal
                                    </button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* MODAL RIWAYAT PENGHAPUSAN */}
                    {showDeletedHistoryModal && (
                        <div className="fixed inset-0 bg-gray-900/60 backdrop-blur-sm flex items-center justify-center p-4 z-50 fade-in">
                            <div className="bg-white rounded-3xl p-6 w-full max-w-4xl shadow-2xl flex flex-col max-h-[85vh]">
                                <div className="flex justify-between items-center border-b border-gray-100 pb-4 mb-4">
                                    <h2 className="text-xl font-bold flex items-center gap-2 text-red-600">
                                        <Icon name="trash-2" /> Riwayat Penghapusan
                                    </h2>
                                    <button onClick={() => setShowDeletedHistoryModal(false)} className="text-gray-400 hover:text-red-500 transition bg-gray-100 hover:bg-red-50 p-2 rounded-full">
                                        <Icon name="x" className="w-5 h-5" />
                                    </button>
                                </div>
                                <div className="overflow-y-auto flex-1 pr-2">
                                    <table className="w-full text-left border-collapse min-w-[600px]">
                                        <thead>
                                            <tr className="bg-red-50 text-red-700 text-xs uppercase tracking-wider border-b border-red-100">
                                                <th className="p-3 font-bold">Dihapus Pada</th>
                                                <th className="p-3 font-bold">Dihapus Oleh</th>
                                                <th className="p-3 font-bold">Rincian Pesanan</th>
                                                <th className="p-3 font-bold text-right">Total</th>
                                            </tr>
                                        </thead>
                                        <tbody className="divide-y divide-gray-100">
                                            {deletedOrders.length === 0 ? (
                                                <tr>
                                                    <td colSpan="4" className="p-12 text-center text-gray-400">
                                                        <div className="flex flex-col items-center gap-3">
                                                            <Icon name="check-circle" className="w-12 h-12 text-green-200" />
                                                            <p>Belum ada riwayat pesanan yang dihapus.</p>
                                                        </div>
                                                    </td>
                                                </tr>
                                            ) : (
                                                deletedOrders.map(order => (
                                                    <tr key={order.id} className="hover:bg-red-50/50 transition">
                                                        <td className="p-3 align-top">
                                                            <div className="text-sm font-bold text-gray-800">{new Date(order.deletedAt).toLocaleTimeString('id-ID', {hour: '2-digit', minute:'2-digit'})}</div>
                                                            <div className="text-xs text-gray-500">{new Date(order.deletedAt).toLocaleDateString('id-ID')}</div>
                                                        </td>
                                                        <td className="p-3 align-top">
                                                            <span className="inline-flex items-center gap-1 px-2 py-1 rounded bg-red-100 text-red-700 text-xs font-bold mt-1">
                                                                <Icon name="user" className="w-3 h-3" /> {order.deletedBy}
                                                            </span>
                                                        </td>
                                                        <td className="p-3">
                                                            <div className="font-medium text-gray-800 text-sm leading-snug">
                                                                {order.items ? order.items.map((it, i) => (
                                                                    <div key={i} className="flex items-start gap-1.5"><span className="text-red-400 mt-0.5">•</span> {it.name} <span className="text-gray-400 font-normal ml-1">x{it.qty}</span></div>
                                                                )) : order.name}
                                                            </div>
                                                            <div className="text-[10px] text-gray-400 mt-2 italic">Dipesan: {new Date(order.timestamp).toLocaleString('id-ID')}</div>
                                                        </td>
                                                        <td className="p-3 text-right align-top">
                                                            <span className="font-bold text-gray-800 block mb-1">{formatRupiah(order.price)}</span>
                                                            {order.isQris && <span className="inline-flex items-center gap-1 text-[10px] font-bold px-1.5 py-0.5 bg-blue-100 text-blue-700 rounded"><Icon name="qr-code" className="w-3 h-3"/> QRIS</span>}
                                                        </td>
                                                    </tr>
                                                ))
                                            )}
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* MODAL LOGIN ADMIN UNTUK MEMBUKA FITUR TERKUNCI */}
                    {showAdminLoginModal && (
                        <div className="fixed inset-0 bg-gray-900/60 backdrop-blur-sm flex items-center justify-center p-4 z-50 fade-in">
                            <div className="bg-white rounded-3xl p-6 w-full max-w-sm shadow-2xl">
                                <div className="w-14 h-14 bg-orange-100 rounded-full flex items-center justify-center mx-auto mb-4">
                                    <Icon name="shield-check" className="text-orange-600 w-7 h-7" />
                                </div>
                                <h3 className="text-xl font-bold text-gray-800 text-center mb-2">Otorisasi Admin</h3>
                                <p className="text-sm text-gray-500 text-center mb-6">Minta Admin memasukkan PIN untuk membuka akses ini.</p>
                                
                                <div className="relative mb-2">
                                    <div className="absolute left-4 top-1/2 transform -translate-y-1/2 text-gray-400"><Icon name="key" className="w-5 h-5" /></div>
                                    <input 
                                        type="password" ref={passwordInputRef} value={adminPasswordInput} onChange={(e) => setAdminPasswordInput(e.target.value)}
                                        placeholder="PIN Admin..." className="w-full pl-12 pr-4 py-3 bg-gray-50 border border-gray-200 rounded-xl focus:border-orange-500 outline-none text-center tracking-widest text-lg font-bold"
                                        onKeyDown={(e) => { if(e.key === 'Enter') handleAdminLogin(); }}
                                    />
                                </div>
                                {adminError && <p className="text-sm text-red-500 mb-4 font-semibold text-center animate-pulse">{adminError}</p>}

                                <div className="flex gap-3 mt-6">
                                    <button onClick={cancelAdminLogin} className="flex-1 bg-gray-100 hover:bg-gray-200 text-gray-700 font-bold py-3 rounded-xl transition">Batal</button>
                                    <button onClick={handleAdminLogin} className="flex-1 bg-orange-600 hover:bg-orange-700 text-white font-bold py-3 rounded-xl shadow-md">Buka Akses</button>
                                </div>
                            </div>
                        </div>
                    )}
                    
                    {/* TOAST SYSTEM */}
                    {toast.show && (
                        <div className={`fixed bottom-6 right-6 flex items-center gap-3 text-white px-6 py-4 rounded-xl shadow-2xl animate-bounce z-50 ${toast.type === 'error' ? 'bg-red-600' : 'bg-green-600'}`}>
                            <Icon name={toast.type === 'error' ? 'alert-triangle' : 'check-circle'} className="w-6 h-6" />
                            <span className="font-bold">{toast.message}</span>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
