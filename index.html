<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kedai Bu Titin</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone@7.23.6/babel.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@0.330.0/dist/umd/lucide.min.js"></script>

    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #fdfbf7; }
        .glass-card { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); }
        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb { background: #f59e0b; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #ea580c; }
        
        .fade-in { animation: fadeIn 0.3s ease-in; }

        input[type="number"]::-webkit-inner-spin-button, 
        input[type="number"]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
        input[type="number"] { -moz-appearance: textfield; }

</head>
<body>
    <div id="root"></div>

    <!-- Script Module Firebase -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, onSnapshot, addDoc, deleteDoc, doc, setDoc, getDocs } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // Mengekspos Firebase ke window agar bisa dibaca dengan aman oleh React
        window.FirebaseAPI = {
            initializeApp, getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken,
            getFirestore, collection, onSnapshot, addDoc, deleteDoc, doc, setDoc, getDocs
        };
    </script>

    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;

        const DELETE_PASSWORD = "butitin123";

        // Daftar Akun Pengguna (Hanya Admin dan Kasir)
        const APP_USERS = [
            { name: 'Admin', role: 'ADMIN', pin: 'butitin123' },
            { name: 'Kasir', role: 'KASIR', pin: '1234' }
        ];

        // Daftar Semua Menu
        const MENU_ITEMS = [
            { id: 'm1', name: 'Ayam Geprek', basePrice: 10000, icon: 'drumstick' },
            { id: 'm3', name: 'Ayam Bakar', basePrice: 12000, icon: 'flame' },
            { id: 'm4', name: 'Kue', basePrice: 1000, icon: 'cake' },
            { id: 'm5', name: 'Tiwul', basePrice: 13000, icon: 'salad' },
            { id: 'm6', name: 'Prasmanan', basePrice: 0, icon: 'utensils' },
            { id: 'm7', name: 'Kukusan', basePrice: 0, icon: 'soup' },
            { id: 'm8', name: 'Minuman', basePrice: 0, icon: 'cup-soda' },
            { id: 'm9', name: 'Lain-Lain', basePrice: 0, icon: 'more-horizontal' }
        ];

        // 🔴 PENTING UNTUK VERCEL: Masukkan konfigurasi Firebase Anda di bawah ini
        const MY_FIREBASE_CONFIG = {
            apiKey: "AIzaSyDeAxdaokFnPsqDUAEBWBjjTjCTSXYk8U8",
            authDomain: "kedai-bu-titin.firebaseapp.com",
            projectId: "kedai-bu-titin",
            storageBucket: "kedai-bu-titin.firebasestorage.app",
            messagingSenderId: "735859710275",
            appId: "1:735859710275:web:4adca4554734f4f36cb7f6",
            measurementId: "G-0MN2Q7XH5Y"
        };

        const Icon = ({ name, className }) => {
            const iconRef = useRef(null);
            useEffect(() => {
                if (iconRef.current && window.lucide) {
                    iconRef.current.innerHTML = '';
                    const i = document.createElement('i');
                    i.setAttribute('data-lucide', name);
                    if (className) i.className = className;
                    iconRef.current.appendChild(i);
                    window.lucide.createIcons({ root: iconRef.current });
                }
            }, [name, className]);
            return <span ref={iconRef} className="inline-flex items-center justify-center"></span>;
        };

        function App() {
            // --- STATE DECLARATIONS ---
            const [fb, setFb] = useState(null);
            const [user, setUser] = useState(null);
            const [orders, setOrders] = useState([]);
            const [allFinance, setAllFinance] = useState([]);
            const [deletedOrders, setDeletedOrders] = useState([]);
            const [isLoading, setIsLoading] = useState(true);

            // Tab & View State
            const [activeTab, setActiveTab] = useState('KASIR'); 
            const [visibleCount, setVisibleCount] = useState(15); // State baru untuk load more
            
            // Internal database menggunakan SIANG/MALAM
            const [stockViewSession, setStockViewSession] = useState('SIANG');

            // Cart State
            const [cart, setCart] = useState([]);
            const [isQris, setIsQris] = useState(false);

            // Modal States
            const [manualModal, setManualModal] = useState({ show: false, item: null });
            const [manualPriceInput, setManualPriceInput] = useState("");
            const [showExportModal, setShowExportModal] = useState(false);
            const [showDeletedHistoryModal, setShowDeletedHistoryModal] = useState(false);

            // Finance (Keuangan) State
            const [selectedFinanceDate, setSelectedFinanceDate] = useState(getTodayDocId());
            const [dailyFinance, setDailyFinance] = useState({ 
                uangLaciSiang: 0, uangLaciMalam: 0, 
                pengeluaranSiang: [], pengeluaranMalam: [],
                plusanSiang: 0, plusanMalam: 0,
                selisihTambahanSiang: 0, selisihTambahanMalam: 0
            });
            const [expenseInputs, setExpenseInputs] = useState({
                SIANG: { ket: '', biaya: '' },
                MALAM: { ket: '', biaya: '' }
            });

            // Stock State
            const [allStock, setAllStock] = useState([]);
            const [selectedStockDate, setSelectedStockDate] = useState(getTodayDocId());
            const [dailyStock, setDailyStock] = useState({ SIANG: {}, MALAM: {} });

            // Session State (Database SIANG = Pagi, MALAM = Siang)
            const [activeSession, setActiveSession] = useState('SIANG'); 
            const [showSessionModal, setShowSessionModal] = useState(false);
            const [sessionSettings, setSessionSettings] = useState({ lastDate: getTodayDocId(), currentSession: 'SIANG' });

            // Global & User State
            const [activeUser, setActiveUser] = useState(null); 
            const [selectedUserForLogin, setSelectedUserForLogin] = useState(null); 
            const [isTempAdminUnlocked, setIsTempAdminUnlocked] = useState(false); 
            const [loginPin, setLoginPin] = useState("");
            const [loginError, setLoginError] = useState("");
            
            // Admin Action State
            const [pendingDeleteId, setPendingDeleteId] = useState(null);
            const [showAdminLoginModal, setShowAdminLoginModal] = useState(false);
            const [adminPasswordInput, setAdminPasswordInput] = useState("");
            const [adminError, setAdminError] = useState("");
            const passwordInputRef = useRef(null);

            // Toast Notifications
            const [toast, setToast] = useState({ show: false, message: "", type: "success" });

            function getTodayDocId() {
                const d = new Date();
                return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
            }

            // --- 1. INITIALIZE FIREBASE & AUTH ---
            useEffect(() => {
                const setupBackend = () => {
                    let configToUse = null;
                    if (typeof __firebase_config !== 'undefined' && __firebase_config) {
                        configToUse = JSON.parse(__firebase_config); 
                    } else if (MY_FIREBASE_CONFIG.apiKey) {
                        configToUse = MY_FIREBASE_CONFIG; 
                    }

                    if (configToUse) {
                        const checkFirebase = setInterval(async () => {
                            if (window.FirebaseAPI) {
                                clearInterval(checkFirebase);
                                try {
                                    const fbAPI = window.FirebaseAPI;
                                    const app = fbAPI.initializeApp(configToUse);
                                    const auth = fbAPI.getAuth(app);
                                    const db = fbAPI.getFirestore(app);
                                    const appId = typeof __app_id !== 'undefined' ? __app_id : 'kedai-bu-titin-pos';
                                    
                                    setFb({ 
                                        db, appId, 
                                        collection: fbAPI.collection, 
                                        onSnapshot: fbAPI.onSnapshot, 
                                        addDoc: fbAPI.addDoc, 
                                        deleteDoc: fbAPI.deleteDoc, 
                                        doc: fbAPI.doc,
                                        setDoc: fbAPI.setDoc,
                                        getDocs: fbAPI.getDocs
                                    });

                                    if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                                        await fbAPI.signInWithCustomToken(auth, __initial_auth_token);
                                    } else {
                                        await fbAPI.signInAnonymously(auth);
                                    }

                                    fbAPI.onAuthStateChanged(auth, (currentUser) => {
                                        setUser(currentUser);
                                        if(!currentUser) setIsLoading(false);
                                    });
                                } catch (error) {
                                    console.error("Firebase Init Error:", error);
                                    setFb('ERROR');
                                    setIsLoading(false);
                                }
                            }
                        }, 100);
                    } else {
                        setFb('NO_DB');
                        setIsLoading(false);
                    }
                };
                setupBackend();
            }, []);

            // --- 2. FETCH DATA & CLEANUP 7 DAYS ---
            useEffect(() => {
                if (fb === 'NO_DB' || fb === 'ERROR' || !user || !fb) return;

                const todayId = getTodayDocId();

                // Fetch Settings
                const settingsRef = fb.doc(fb.db, 'artifacts', fb.appId, 'public', 'data', 'settings', 'app_config');
                const unsubSettings = fb.onSnapshot(settingsRef, (docSnap) => {
                    if (docSnap.exists()) {
                        const data = docSnap.data();
                        if (data.lastDate !== todayId) {
                            const newSettings = { lastDate: todayId, currentSession: 'SIANG' };
                            setSessionSettings(newSettings);
                            setActiveSession('SIANG');
                            fb.setDoc(settingsRef, newSettings, { merge: true });
                        } else {
                            setSessionSettings(data);
                            setActiveSession(data.currentSession || 'SIANG');
                        }
                    } else {
                        const newSettings = { lastDate: todayId, currentSession: 'SIANG' };
                        setSessionSettings(newSettings);
                        setActiveSession('SIANG');
                        fb.setDoc(settingsRef, newSettings, { merge: true });
                    }
                });

                // Fetch Orders (Tanpa mapping, murni ambil data SIANG/MALAM)
                const ordersRef = fb.collection(fb.db, 'artifacts', fb.appId, 'public', 'data', 'orders_kedai_titin');
                const unsubOrders = fb.onSnapshot(ordersRef, 
                    (snapshot) => {
                        const data = [];
                        snapshot.forEach((doc) => data.push({ id: doc.id, ...doc.data() }));
                        data.sort((a, b) => b.timestamp - a.timestamp);
                        setOrders(data);
                        setIsLoading(false);
                    },
                    (error) => { console.error(error); setIsLoading(false); }
                );

                // Fetch All Stock (Tanpa mapping)
                const stockCollRef = fb.collection(fb.db, 'artifacts', fb.appId, 'public', 'data', 'stock_kedai_titin');
                const unsubStockAll = fb.onSnapshot(stockCollRef, (snapshot) => {
                    const data = [];
                    snapshot.forEach(doc => {
                        data.push({ id: doc.id, ...doc.data() });
                    });
                    setAllStock(data);
                }, (error) => console.error(error));

                // Fetch All Finance (Tanpa mapping)
                const financeCollRef = fb.collection(fb.db, 'artifacts', fb.appId, 'public', 'data', 'finance_kedai_titin');
                const unsubFinanceAll = fb.onSnapshot(financeCollRef, (snapshot) => {
                    const data = [];
                    snapshot.forEach(doc => {
                        data.push({ id: doc.id, ...doc.data() });
                    });
                    setAllFinance(data);
                }, (error) => console.error(error));

                // Fetch Deleted Orders
                const deletedOrdersRef = fb.collection(fb.db, 'artifacts', fb.appId, 'public', 'data', 'deleted_orders_kedai_titin');
                const unsubDeletedOrders = fb.onSnapshot(deletedOrdersRef, 
                    (snapshot) => {
                        const data = [];
                        snapshot.forEach((doc) => data.push({ id: doc.id, ...doc.data() }));
                        data.sort((a, b) => b.deletedAt - a.deletedAt);
                        setDeletedOrders(data);
                    },
                    (error) => console.error(error)
                );

                // --- CLEANUP DATA > 7 DAYS ---
                const runCleanup = async () => {
                    try {
                        const sevenDaysAgo = Date.now() - (7 * 24 * 60 * 60 * 1000);
                        const cutoffDate = new Date(sevenDaysAgo);
                        const cutoffDateStr = `${cutoffDate.getFullYear()}-${String(cutoffDate.getMonth() + 1).padStart(2, '0')}-${String(cutoffDate.getDate()).padStart(2, '0')}`;

                        if (fb.getDocs) {
                            // Hapus Orders lama
                            const ordersSnap = await fb.getDocs(fb.collection(fb.db, 'artifacts', fb.appId, 'public', 'data', 'orders_kedai_titin'));
                            ordersSnap.forEach(doc => { if (doc.data().timestamp < sevenDaysAgo) fb.deleteDoc(doc.ref).catch(()=>{}); });

                            // Hapus Deleted Orders lama
                            const delSnap = await fb.getDocs(fb.collection(fb.db, 'artifacts', fb.appId, 'public', 'data', 'deleted_orders_kedai_titin'));
                            delSnap.forEach(doc => { if (doc.data().timestamp < sevenDaysAgo) fb.deleteDoc(doc.ref).catch(()=>{}); });

                            // Hapus Finance lama
                            const finSnap = await fb.getDocs(fb.collection(fb.db, 'artifacts', fb.appId, 'public', 'data', 'finance_kedai_titin'));
                            finSnap.forEach(doc => { if (doc.id < cutoffDateStr) fb.deleteDoc(doc.ref).catch(()=>{}); });

                            // Hapus Stock lama
                            const stockSnap = await fb.getDocs(fb.collection(fb.db, 'artifacts', fb.appId, 'public', 'data', 'stock_kedai_titin'));
                            stockSnap.forEach(doc => { if (doc.id < cutoffDateStr) fb.deleteDoc(doc.ref).catch(()=>{}); });
                        }
                    } catch (err) { console.error("Cleanup error", err); }
                };

                const timerId = setTimeout(runCleanup, 3000); 

                return () => { unsubOrders(); unsubStockAll(); unsubFinanceAll(); unsubDeletedOrders(); unsubSettings(); clearTimeout(timerId); };
            }, [user, fb]);

            // Sync dailyStock state with selectedStockDate
            useEffect(() => {
                const data = allStock.find(d => d.id === selectedStockDate);
                if (data) {
                    setDailyStock({
                        SIANG: data.SIANG || {},
                        MALAM: data.MALAM || {}
                    });
                } else {
                    setDailyStock({ SIANG: {}, MALAM: {} });
                }
            }, [selectedStockDate, allStock]);

            // Sync dailyFinance state with selectedFinanceDate
            useEffect(() => {
                const data = allFinance.find(d => d.id === selectedFinanceDate);
                if (data) {
                    setDailyFinance({
                        uangLaciSiang: data.uangLaciSiang || 0,
                        uangLaciMalam: data.uangLaciMalam || 0,
                        pengeluaranSiang: data.pengeluaranSiang || [],
                        pengeluaranMalam: data.pengeluaranMalam || [],
                        plusanSiang: data.plusanSiang || 0,
                        plusanMalam: data.plusanMalam || 0,
                        selisihTambahanSiang: data.selisihTambahanSiang || 0,
                        selisihTambahanMalam: data.selisihTambahanMalam || 0
                    });
                } else {
                    setDailyFinance({ 
                        uangLaciSiang: 0, uangLaciMalam: 0, 
                        pengeluaranSiang: [], pengeluaranMalam: [],
                        plusanSiang: 0, plusanMalam: 0,
                        selisihTambahanSiang: 0, selisihTambahanMalam: 0
                    });
                }
            }, [selectedFinanceDate, allFinance]);

            useEffect(() => {
                if(showAdminLoginModal && passwordInputRef.current) passwordInputRef.current.focus();
            }, [showAdminLoginModal]);

            useEffect(() => {
                if(manualModal.show) document.getElementById('manualPriceInput')?.focus();
            }, [manualModal.show]);

            // --- COMPUTED DATA ---
            const isAuthorized = activeUser?.role === 'ADMIN' || isTempAdminUnlocked;
            
            const isPastFinanceDate = selectedFinanceDate !== getTodayDocId();
            // UI 'Pagi' mengedit state 'SIANG'
            const canEditFinancePagi = isAuthorized || (!isPastFinanceDate && activeSession === 'SIANG'); 
            // UI 'Siang' mengedit state 'MALAM'
            const canEditFinanceSiang = isAuthorized || (!isPastFinanceDate && activeSession === 'MALAM'); 

            const isPastStockDate = selectedStockDate !== getTodayDocId();
            const canEditStockPagi = isAuthorized || (!isPastStockDate && activeSession === 'SIANG'); 
            const canEditStockSiang = isAuthorized || (!isPastStockDate && activeSession === 'MALAM'); 

            const formatRupiah = (number) => {
                return new Intl.NumberFormat('id-ID', { style: 'currency', currency: 'IDR', minimumFractionDigits: 0 }).format(number);
            };

            const showToast = (message, type = "success") => {
                setToast({ show: true, message, type });
                setTimeout(() => setToast({ show: false, message: "", type: "success" }), 3500);
            };

            // Array 7 Hari Terakhir untuk Dropdown
            const last7Days = useMemo(() => {
                const days = [];
                for (let i = 0; i < 7; i++) {
                    const d = new Date();
                    d.setDate(d.getDate() - i);
                    const id = `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
                    const label = i === 0 ? 'Hari Ini' : d.toLocaleDateString('id-ID', { weekday: 'long', day: 'numeric', month: 'short' });
                    days.push({ id, label });
                }
                return days;
            }, []);

            // Menerapkan state visibleCount untuk merender baris sesuai batasan
            const displayedOrders = useMemo(() => {
                return orders.slice(0, visibleCount);
            }, [orders, visibleCount]);

            const stats = useMemo(() => {
                const now = new Date();
                const todayStart = new Date(now.getFullYear(), now.getMonth(), now.getDate()).getTime();
                const monthStart = new Date(now.getFullYear(), now.getMonth(), 1).getTime();

                let dCash = 0, dQris = 0;
                let mCash = 0, mQris = 0;
                let oCash = 0, oQris = 0;

                orders.forEach(order => {
                    const ts = order.timestamp;
                    const price = order.price;
                    
                    if (order.isQris) oQris += price; else oCash += price;

                    if (ts >= monthStart) {
                        if (order.isQris) mQris += price; else mCash += price;
                        if (ts >= todayStart) {
                            if (order.isQris) dQris += price; else dCash += price;
                        }
                    }
                });

                let dPlus = 0, dPeng = 0;
                let mPlus = 0, mPeng = 0;
                let oPlus = 0, oPeng = 0;

                allFinance.forEach(fin => {
                    const parts = fin.id.split('-');
                    if (parts.length === 3) {
                        const docDate = new Date(parts[0], parts[1]-1, parts[2]);
                        const docTime = docDate.getTime();

                        const plusan = (fin.plusanSiang || 0) + (fin.plusanMalam || 0);
                        const peng = (fin.pengeluaranSiang || []).reduce((s, i) => s + i.biaya, 0) + 
                                     (fin.pengeluaranMalam || []).reduce((s, i) => s + i.biaya, 0);

                        oPlus += plusan;
                        oPeng += peng;

                        if (docTime >= monthStart) {
                            mPlus += plusan;
                            mPeng += peng;
                            if (docTime === todayStart) {
                                dPlus += plusan;
                                dPeng += peng;
                            }
                        }
                    }
                });

                const calc = (cash, qris, plus, peng) => {
                    const bersihTunai = cash + plus - peng;
                    const totalBersih = bersihTunai + qris;
                    return { bersihTunai, qris, totalBersih };
                };

                return {
                    daily: calc(dCash, dQris, dPlus, dPeng),
                    monthly: calc(mCash, mQris, mPlus, mPeng),
                    overall: calc(oCash, oQris, oPlus, oPeng)
                };
            }, [orders, allFinance]);

            // Untuk Stok (Menghitung Terjual berdasarkan tanggal Stok terpilih)
            const soldItemsForStock = useMemo(() => {
                const counts = { SIANG: {}, MALAM: {} };
                const selectedDateStart = new Date(selectedStockDate);
                selectedDateStart.setHours(0,0,0,0);
                const selectedDateEnd = selectedDateStart.getTime() + 86400000 - 1;

                orders.filter(o => o.timestamp >= selectedDateStart.getTime() && o.timestamp <= selectedDateEnd).forEach(order => {
                    const session = order.session || 'SIANG';
                    if (order.items && Array.isArray(order.items)) {
                        order.items.forEach(item => { counts[session][item.name] = (counts[session][item.name] || 0) + item.qty; });
                    }
                });
                return counts;
            }, [orders, selectedStockDate]);

            // Finance Stats Khusus untuk "Tanggal Terpilih"
            const financeStats = useMemo(() => {
                const selectedDateStart = new Date(selectedFinanceDate);
                selectedDateStart.setHours(0,0,0,0);
                const selectedDateEnd = selectedDateStart.getTime() + 86400000 - 1;

                const ordersForSelectedDate = orders.filter(o => o.timestamp >= selectedDateStart.getTime() && o.timestamp <= selectedDateEnd);

                let totalAllSiang = 0; let totalAllMalam = 0;
                let grossCashSiang = 0; let grossCashMalam = 0;
                let totalQrisSiang = 0; let totalQrisMalam = 0;
                
                const menuIncomeSiang = {};
                const menuIncomeMalam = {};

                ordersForSelectedDate.forEach(o => {
                    const session = o.session || 'SIANG';
                    if (session === 'SIANG') {
                        totalAllSiang += o.price;
                        if (o.isQris) totalQrisSiang += o.price; else grossCashSiang += o.price;
                        if(o.items) o.items.forEach(it => menuIncomeSiang[it.name] = (menuIncomeSiang[it.name]||0) + (it.price * it.qty));
                    } else if (session === 'MALAM') {
                        totalAllMalam += o.price;
                        if (o.isQris) totalQrisMalam += o.price; else grossCashMalam += o.price;
                        if(o.items) o.items.forEach(it => menuIncomeMalam[it.name] = (menuIncomeMalam[it.name]||0) + (it.price * it.qty));
                    }
                });

                const pengeluaranSiangTotal = (dailyFinance.pengeluaranSiang || []).reduce((sum, item) => sum + item.biaya, 0);
                const pengeluaranMalamTotal = (dailyFinance.pengeluaranMalam || []).reduce((sum, item) => sum + item.biaya, 0);

                const plusanSiang = dailyFinance.plusanSiang || 0;
                const plusanMalam = dailyFinance.plusanMalam || 0;

                const bersihTunaiSiang = grossCashSiang + plusanSiang - pengeluaranSiangTotal;
                const bersihTunaiMalam = grossCashMalam + plusanMalam - pengeluaranMalamTotal;

                const bersihTotalSiang = bersihTunaiSiang + totalQrisSiang;
                const bersihTotalMalam = bersihTunaiMalam + totalQrisMalam;

                const selisihTambahanSiang = dailyFinance.selisihTambahanSiang || 0;
                const selisihTambahanMalam = dailyFinance.selisihTambahanMalam || 0;

                const expectedCashSiang = bersihTunaiSiang + selisihTambahanSiang;
                const expectedCashMalam = bersihTunaiMalam + selisihTambahanMalam;

                const selisihAkhirSiang = (dailyFinance.uangLaciSiang || 0) - expectedCashSiang;
                const selisihAkhirMalam = (dailyFinance.uangLaciMalam || 0) - expectedCashMalam;

                return { 
                    siang: { menuIncome: menuIncomeSiang, totalAll: totalAllSiang, grossCash: grossCashSiang, totalQris: totalQrisSiang, pengeluaran: pengeluaranSiangTotal, plusan: plusanSiang, bersihTunai: bersihTunaiSiang, bersihTotal: bersihTotalSiang, expectedCash: expectedCashSiang, selisihTambahan: selisihTambahanSiang, selisih: selisihAkhirSiang },
                    malam: { menuIncome: menuIncomeMalam, totalAll: totalAllMalam, grossCash: grossCashMalam, totalQris: totalQrisMalam, pengeluaran: pengeluaranMalamTotal, plusan: plusanMalam, bersihTunai: bersihTunaiMalam, bersihTotal: bersihTotalMalam, expectedCash: expectedCashMalam, selisihTambahan: selisihTambahanMalam, selisih: selisihAkhirMalam }
                };
            }, [orders, dailyFinance, selectedFinanceDate]);

            const currentCartTotal = useMemo(() => cart.reduce((sum, item) => sum + (item.price * item.qty), 0), [cart]);

            // --- ACTIONS ---
            const handleAppLogin = (e) => {
                e.preventDefault();
                if (selectedUserForLogin && selectedUserForLogin.pin === loginPin) {
                    setActiveUser(selectedUserForLogin);
                    setLoginPin(""); setLoginError(""); setIsTempAdminUnlocked(false); setSelectedUserForLogin(null);
                    showToast(`Selamat datang, ${selectedUserForLogin.name}!`, "success");
                } else {
                    setLoginError("PIN salah!");
                }
            };

            const handleAppLogout = () => {
                setActiveUser(null); setIsTempAdminUnlocked(false); setCart([]); setActiveTab('KASIR'); setVisibleCount(15);
                showToast("Berhasil Logout", "success");
            };

            const switchSession = async () => {
                if (fb === 'NO_DB' || !fb || !user) return;
                const nextSession = activeSession === 'SIANG' ? 'MALAM' : 'SIANG';
                try {
                    const settingsRef = fb.doc(fb.db, 'artifacts', fb.appId, 'public', 'data', 'settings', 'app_config');
                    await fb.setDoc(settingsRef, { currentSession: nextSession }, { merge: true });
                    setShowSessionModal(false);
                    showToast(`Berhasil pindah ke Sesi ${nextSession === 'SIANG' ? 'Pagi' : 'Siang'}!`, "success");
                } catch (error) { showToast("Gagal memindahkan sesi.", "error"); }
            };

            const submitManualPrice = (e) => {
                e.preventDefault();
                const price = Number(manualPriceInput);
                if (price <= 0) { showToast("Harga tidak valid", "error"); return; }
                setCart(prev => {
                    const existing = prev.find(i => i.id === manualModal.item.id && i.price === price);
                    if (existing) return prev.map(i => i === existing ? {...i, qty: i.qty + 1} : i);
                    return [...prev, { ...manualModal.item, price: price, qty: 1, cartId: Date.now().toString() }];
                });
                setManualModal({ show: false, item: null });
                setManualPriceInput("");
            };

            const updateCartQty = (cartId, delta) => {
                setCart(prev => prev.map(i => {
                    if (i.cartId === cartId) {
                        const newQty = i.qty + delta;
                        return newQty > 0 ? { ...i, qty: newQty } : null;
                    }
                    return i;
                }).filter(Boolean));
            };

            const clearCart = () => setCart([]);

            const handleCheckout = async () => {
                if (cart.length === 0) return;
                if (fb === 'NO_DB' || fb === 'ERROR') { showToast("Gagal: Database tidak terhubung", "error"); return; }
                if (!user || !fb) return;

                const itemsStr = cart.map(i => `${i.name} x${i.qty}`).join(', ');
                const newOrder = {
                    name: itemsStr,
                    items: cart.map(i => ({ id: i.id, name: i.name, price: i.price, qty: i.qty })),
                    price: currentCartTotal,
                    timestamp: Date.now(),
                    kasir: activeUser.name,
                    isQris: isQris,
                    session: activeSession // Murni menyimpan 'SIANG' atau 'MALAM' ke DB
                };

                try {
                    const collectionRef = fb.collection(fb.db, 'artifacts', fb.appId, 'public', 'data', 'orders_kedai_titin');
                    await fb.addDoc(collectionRef, newOrder);
                    setCart([]); setIsQris(false);
                    showToast("Pesanan berhasil disimpan!", "success");
                } catch (error) { showToast("Gagal menyimpan pesanan.", "error"); }
            };

            const handleDeleteClick = (id) => {
                if (isAuthorized) executeDelete(id);
                else { setPendingDeleteId(id); setAdminPasswordInput(""); setAdminError(""); setShowAdminLoginModal(true); }
            };

            const executeDelete = async (id) => {
                if (!user || !fb || fb === 'NO_DB' || fb === 'ERROR') return;
                try {
                    const orderToTrash = orders.find(o => o.id === id);
                    if (orderToTrash) {
                        const trashRef = fb.collection(fb.db, 'artifacts', fb.appId, 'public', 'data', 'deleted_orders_kedai_titin');
                        await fb.addDoc(trashRef, {
                            ...orderToTrash,
                            deletedAt: Date.now(),
                            deletedBy: activeUser?.name || 'Admin'
                        });
                    }

                    const docRef = fb.doc(fb.db, 'artifacts', fb.appId, 'public', 'data', 'orders_kedai_titin', id);
                    await fb.deleteDoc(docRef);
                    showToast("Data pesanan dihapus.", "success");
                } catch (error) { showToast("Gagal menghapus data.", "error"); }
            };

            const handleLockedCardClick = () => {
                if (!isAuthorized) {
                    setPendingDeleteId(null); setAdminPasswordInput(""); setAdminError(""); setShowAdminLoginModal(true);
                }
            };

            const handleAdminLogin = () => {
                const adminUser = APP_USERS.find(u => u.role === 'ADMIN');
                if (adminPasswordInput === adminUser.pin) {
                    setIsTempAdminUnlocked(true); setShowAdminLoginModal(false); setAdminPasswordInput(""); setAdminError("");
                    showToast("Akses Admin Terbuka!", "success");
                    if (pendingDeleteId) { executeDelete(pendingDeleteId); setPendingDeleteId(null); }
                } else { setAdminError("PIN Admin Salah!"); }
            };

            const handleLockAdminAccess = () => {
                setIsTempAdminUnlocked(false); setPendingDeleteId(null); setActiveTab('KASIR'); setVisibleCount(15);
                showToast("Akses Admin Dikunci", "success");
            };

            const cancelAdminLogin = () => { setShowAdminLoginModal(false); setPendingDeleteId(null); };

            const handleUpdateStock = (sessionType, itemName, field, value) => {
                if (!isAuthorized) {
                    if (sessionType === 'SIANG' && !canEditStockPagi) return; // 'SIANG' internal = Pagi UI
                    if (sessionType === 'MALAM' && !canEditStockSiang) return; // 'MALAM' internal = Siang UI
                }

                const val = Number(value) || 0;
                setDailyStock(prev => {
                    const newState = {
                        ...prev,
                        [sessionType]: {
                            ...(prev[sessionType] || {}),
                            [itemName]: { ...((prev[sessionType] || {})[itemName] || {awal: 0, tambah: 0, fisik: 0}), [field]: val }
                        }
                    };
                    // Fitur Auto-Save murni SIANG dan MALAM
                    if (user && fb !== 'NO_DB') {
                        const stockRef = fb.doc(fb.db, 'artifacts', fb.appId, 'public', 'data', 'stock_kedai_titin', selectedStockDate);
                        fb.setDoc(stockRef, newState, { merge: true }).catch(console.error);
                    }
                    return newState;
                });
            };

            const saveFinanceToDb = async (sessionType) => {
                if (!user || !fb || fb === 'NO_DB') return;
                try {
                    const financeRef = fb.doc(fb.db, 'artifacts', fb.appId, 'public', 'data', 'finance_kedai_titin', selectedFinanceDate);
                    const updateData = sessionType === 'SIANG' 
                        ? { 
                            uangLaciSiang: dailyFinance.uangLaciSiang,
                            plusanSiang: dailyFinance.plusanSiang,
                            selisihTambahanSiang: dailyFinance.selisihTambahanSiang
                          } 
                        : { 
                            uangLaciMalam: dailyFinance.uangLaciMalam,
                            plusanMalam: dailyFinance.plusanMalam,
                            selisihTambahanMalam: dailyFinance.selisihTambahanMalam
                          };
                    await fb.setDoc(financeRef, updateData, { merge: true });
                    showToast("Data Keuangan Disimpan", "success");
                } catch (error) { showToast("Gagal menyimpan keuangan", "error"); }
            };

            const handleAddExpense = async (sessionType) => {
                const { ket, biaya } = expenseInputs[sessionType];
                if (!ket || !biaya) { showToast("Keterangan dan Biaya wajib diisi", "error"); return; }
                
                const newExpense = { id: Date.now().toString(), ket, biaya: Number(biaya) };
                const fieldToUpdate = sessionType === 'SIANG' ? 'pengeluaranSiang' : 'pengeluaranMalam';
                const currentExpenses = dailyFinance[fieldToUpdate] || [];
                
                if (!user || !fb || fb === 'NO_DB') return;
                try {
                    const financeRef = fb.doc(fb.db, 'artifacts', fb.appId, 'public', 'data', 'finance_kedai_titin', selectedFinanceDate);
                    await fb.setDoc(financeRef, { [fieldToUpdate]: [...currentExpenses, newExpense] }, { merge: true });
                    setExpenseInputs(prev => ({ ...prev, [sessionType]: { ket: '', biaya: '' } }));
                    showToast("Pengeluaran ditambahkan", "success");
                } catch (error) { showToast("Gagal menambah pengeluaran", "error"); }
            };

            const handleDeleteExpense = async (sessionType, expenseId) => {
                const fieldToUpdate = sessionType === 'SIANG' ? 'pengeluaranSiang' : 'pengeluaranMalam';
                const currentExpenses = dailyFinance[fieldToUpdate] || [];
                const newExpenses = currentExpenses.filter(e => e.id !== expenseId);
                
                if (!user || !fb || fb === 'NO_DB') return;
                try {
                    const financeRef = fb.doc(fb.db, 'artifacts', fb.appId, 'public', 'data', 'finance_kedai_titin', selectedFinanceDate);
                    await fb.setDoc(financeRef, { [fieldToUpdate]: newExpenses }, { merge: true });
                    showToast("Pengeluaran dihapus", "success");
                } catch (error) { showToast("Gagal menghapus pengeluaran", "error"); }
            };

            const exportToCSV = () => {
                if (orders.length === 0) { showToast("Belum ada data untuk diekspor.", "error"); setShowExportModal(false); return; }
                
                const csvRows = [["Tanggal", "Waktu", "Rincian Pesanan", "Sesi", "Kasir", "Total Harga (Rp)"].join(',')];
                orders.forEach(order => {
                    const d = new Date(order.timestamp);
                    // Terjemahkan nama sesi untuk file Excel
                    const sessionName = order.session === 'MALAM' ? 'SIANG' : 'PAGI';
                    csvRows.push([d.toLocaleDateString('id-ID'), d.toLocaleTimeString('id-ID'), `"${order.name.replace(/"/g, '""')}"`, sessionName, order.kasir ? `"${order.kasir}"` : "Tidak Diketahui", order.price].join(','));
                });
                
                const blob = new Blob([csvRows.join('\n')], { type: 'text/csv;charset=utf-8;' });
                const url = URL.createObjectURL(blob);
                const link = document.createElement("a"); link.setAttribute("href", url); 
                link.setAttribute("download", `Laporan_Kedai_7_Hari_${new Date().toLocaleDateString('id-ID')}.csv`);
                document.body.appendChild(link); link.click(); document.body.removeChild(link);
                
                showToast("Laporan berhasil diunduh!", "success");
                setShowExportModal(false);
            };

            // --- RENDERERS ---

            if (isLoading) {
                return (
                    <div className="min-h-screen flex items-center justify-center bg-yellow-50">
                        <div className="flex flex-col items-center gap-3">
                            <Icon name="loader-2" className="w-10 h-10 text-orange-500 animate-spin" />
                            <div className="text-xl font-bold text-orange-700 animate-pulse">Menyiapkan Dapur...</div>
                        </div>
                    </div>
                );
            }

            // LOGIN SCREEN
            if (!activeUser) {
                return (
                    <div className="min-h-screen flex items-center justify-center bg-yellow-50 px-4 font-sans">
                        <div className="bg-white p-8 rounded-3xl shadow-xl max-w-sm w-full fade-in border-t-4 border-orange-500">
                            <div className="flex justify-center mb-6">
                                <div className="bg-gradient-to-r from-red-600 to-orange-500 text-white p-4 rounded-full shadow-lg">
                                    <Icon name="utensils-crossed" className="w-10 h-10" />
                                </div>
                            </div>
                            <h2 className="text-2xl font-extrabold text-center text-gray-800 mb-2">Kedai Bu Titin</h2>
                            <p className="text-center text-sm text-gray-500 mb-8">Sistem Kasir Pintar. Silakan masuk.</p>

                            {!selectedUserForLogin ? (
                                <div className="space-y-3 fade-in">
                                    <p className="text-center text-gray-600 font-semibold mb-4">Pilih Akun Anda:</p>
                                    <div className="grid grid-cols-1 gap-3">
                                        {APP_USERS.map((u, idx) => (
                                            <button 
                                                key={idx}
                                                onClick={() => { setSelectedUserForLogin(u); setLoginError(""); setLoginPin(""); }}
                                                className={`flex items-center gap-3 w-full p-4 rounded-xl border-2 transition-all hover:shadow-md ${u.role === 'ADMIN' ? 'border-red-200 hover:border-red-500 bg-red-50 text-red-700' : 'border-orange-200 hover:border-orange-500 bg-orange-50 text-orange-700'}`}
                                            >
                                                <Icon name={u.role === 'ADMIN' ? "shield-check" : "user"} className="w-6 h-6" />
                                                <span className="font-bold text-lg">{u.name}</span>
                                                <span className="ml-auto text-xs font-bold px-2 py-1 rounded bg-white/60">{u.role}</span>
                                            </button>
                                        ))}
                                    </div>
                                </div>
                            ) : (
                                <form onSubmit={handleAppLogin} className="fade-in">
                                    <div className="flex items-center gap-3 mb-6 bg-gray-50 p-3 rounded-xl border border-gray-200">
                                        <div className={`p-2 rounded-full ${selectedUserForLogin.role === 'ADMIN' ? 'bg-red-100 text-red-600' : 'bg-orange-100 text-orange-600'}`}>
                                            <Icon name={selectedUserForLogin.role === 'ADMIN' ? "shield-check" : "user"} className="w-5 h-5" />
                                        </div>
                                        <div className="text-left">
                                            <p className="text-xs text-gray-500 font-semibold">Login sebagai:</p>
                                            <p className="font-bold text-gray-800">{selectedUserForLogin.name}</p>
                                        </div>
                                    </div>

                                    <div className="relative mb-4">
                                        <div className="absolute left-4 top-1/2 transform -translate-y-1/2 text-gray-400"><Icon name="lock-keyhole" className="w-5 h-5" /></div>
                                        <input type="password" value={loginPin} onChange={(e) => setLoginPin(e.target.value)} placeholder="Masukkan PIN..." className="w-full pl-12 pr-4 py-3 bg-gray-50 border border-gray-200 rounded-xl focus:ring-2 focus:ring-orange-500 focus:border-orange-500 outline-none transition text-center tracking-widest text-lg font-bold" autoFocus/>
                                    </div>
                                    {loginError && <p className="text-red-500 text-sm font-semibold mt-2 mb-4 text-center animate-pulse">{loginError}</p>}
                                    
                                    <div className="flex gap-3 mt-6">
                                        <button type="button" onClick={() => setSelectedUserForLogin(null)} className="flex-1 bg-gray-100 hover:bg-gray-200 text-gray-700 font-bold py-3 rounded-xl transition">Kembali</button>
                                        <button type="submit" className="flex-[2] bg-gradient-to-r from-red-500 to-orange-500 hover:from-red-600 hover:to-orange-600 text-white font-bold py-3 rounded-xl shadow-md hover:shadow-lg transition duration-200">Masuk</button>
                                    </div>
                                </form>
                            )}
                        </div>
                    </div>
                );
            }

            // MAIN APP (Tampilan menyesuaikan secara visual tanpa merusak database internal)
            return (
                <div className={`min-h-screen font-sans text-gray-800 pb-12 flex flex-col transition-colors duration-500 ${activeSession === 'SIANG' ? 'bg-sky-50' : 'bg-orange-50/40'}`}>
                    {/* NAVBAR */}
                    <nav className={`text-white shadow-lg py-3 px-4 sm:px-6 md:px-8 sticky top-0 z-40 transition-all duration-500 ${activeSession === 'SIANG' ? 'bg-gradient-to-r from-cyan-600 via-blue-500 to-blue-600' : 'bg-gradient-to-r from-red-600 via-orange-500 to-yellow-500'}`}>
                        <div className="max-w-7xl mx-auto flex flex-col md:flex-row justify-between items-center gap-3">
                            <div className="flex items-center gap-3 w-full md:w-auto justify-between">
                                <div className="flex items-center gap-3">
                                    <div className="bg-white text-red-600 p-2 rounded-full shadow-md flex items-center justify-center">
                                        <Icon name="utensils-crossed" className="w-6 h-6 sm:w-7 sm:h-7" />
                                    </div>
                                    <div>
                                        <h1 className="text-xl sm:text-2xl font-extrabold tracking-tight">Kedai Bu Titin</h1>
                                        <div className="flex items-center gap-2 mt-0.5">
                                            <span className={`text-[10px] sm:text-xs px-2 py-0.5 rounded-md font-bold shadow-sm ${activeSession === 'SIANG' ? 'bg-blue-100 text-blue-800' : 'bg-yellow-200 text-orange-800'}`}>
                                                <Icon name={activeSession === 'SIANG' ? 'sunrise' : 'sun'} className="w-3 h-3 inline mr-1" />
                                                Sesi {activeSession === 'SIANG' ? 'Pagi' : 'Siang'}
                                            </span>
                                            <button onClick={() => setShowSessionModal(true)} className="text-[10px] sm:text-xs bg-white/20 hover:bg-white/30 px-2 py-0.5 rounded-md font-medium transition flex items-center">
                                                Pindah Sesi <Icon name="arrow-right" className="w-3 h-3 ml-1" />
                                            </button>
                                        </div>
                                    </div>
                                </div>
                                <div className="flex md:hidden items-center gap-2">
                                    <span className="font-semibold text-sm">{activeUser.name}</span>
                                </div>
                            </div>
                            
                            {/* Tabs & User Actions */}
                            <div className="flex flex-wrap items-center justify-between md:justify-end w-full md:w-auto gap-4 overflow-x-auto pb-1 md:pb-0">
                                <div className="flex bg-black/20 p-1 rounded-xl">
                                    {/* MENGUBAH VISIBLE COUNT SAAT PINDAH TAB */}
                                    <button onClick={() => { setActiveTab('KASIR'); setVisibleCount(15); }} className={`px-4 py-1.5 rounded-lg text-sm font-bold transition whitespace-nowrap ${activeTab === 'KASIR' ? 'bg-white text-orange-600 shadow' : 'text-white hover:bg-white/10'}`}>Kasir</button>
                                    <button onClick={() => setActiveTab('STOK')} className={`px-4 py-1.5 rounded-lg text-sm font-bold transition flex items-center gap-1 whitespace-nowrap ${activeTab === 'STOK' ? 'bg-white text-orange-600 shadow' : 'text-white hover:bg-white/10'}`}>
                                        Stok
                                    </button>
                                    <button onClick={() => setActiveTab('KEUANGAN')} className={`px-4 py-1.5 rounded-lg text-sm font-bold transition flex items-center gap-1 whitespace-nowrap ${activeTab === 'KEUANGAN' ? 'bg-white text-orange-600 shadow' : 'text-white hover:bg-white/10'}`}>
                                        Keuangan
                                    </button>
                                </div>

                                <div className="hidden md:flex items-center gap-2">
                                    <div className="flex items-center gap-2 text-sm bg-black/10 px-3 py-1.5 rounded-full backdrop-blur-sm mr-2">
                                        <Icon name="user" className="w-4 h-4" />
                                        <span className="font-semibold">{activeUser.name}</span>
                                        <span className="text-yellow-200 text-xs px-1.5 py-0.5 bg-black/20 rounded-md">{activeUser.role}</span>
                                    </div>
                                    {activeUser.role === 'KASIR' && isTempAdminUnlocked && (
                                        <button onClick={handleLockAdminAccess} className="bg-white/20 hover:bg-white/30 border border-white/40 text-white text-sm font-semibold py-1.5 px-3 rounded-full transition flex items-center gap-2" title="Kunci Akses Admin">
                                            <Icon name="lock" className="w-4 h-4" />
                                        </button>
                                    )}
                                    <button onClick={handleAppLogout} className="bg-white text-red-600 hover:bg-red-50 text-sm font-bold py-1.5 px-3 rounded-full shadow-md transition flex items-center gap-2" title="Logout">
                                        <Icon name="log-out" className="w-4 h-4" />
                                    </button>
                                </div>
                            </div>
                        </div>
                    </nav>

                    <main className="max-w-7xl mx-auto px-4 sm:px-6 md:px-8 mt-6 flex-1 w-full">
                        
                        {/* ================= TAB POS KASIR ================= */}
                        {activeTab === 'KASIR' && (
                            <div className="fade-in flex flex-col gap-6">
                                {/* BARIS ATAS: MENU & STRUK BERSEBELAHAN */}
                                <div className="flex flex-col lg:flex-row gap-6 items-start">
                                    {/* KIRI: MENU */}
                                    <div className="w-full lg:w-[55%] flex flex-col gap-6">
                                        <div className="bg-white p-5 rounded-2xl shadow-sm border border-gray-100">

                                                <Icon name="coffee" className="w-5 h-5 text-orange-500" />
                                                Menu Pilihan (Input Harga)
                                            </h2>
                                            
                                            <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-1 xl:grid-cols-2 gap-3 mb-4">
                                                {MENU_ITEMS.map((item) => {
                                                    const qtyInCart = cart.filter(i => i.id === item.id).reduce((sum, i) => sum + i.qty, 0);
                                                    return (
                                                        <button key={item.id} onClick={() => { setManualModal({show: true, item}); setManualPriceInput(""); }} className="flex items-center justify-between p-3 rounded-xl border border-dashed border-blue-300 hover:border-blue-500 bg-blue-50/50 hover:bg-blue-50 transition-all text-left">
                                                            <div className="flex items-center gap-3">
                                                                <div className="bg-blue-100 p-2 rounded-lg text-blue-600"><Icon name={item.icon} className="w-4 h-4" /></div>
                                                                <p className="font-bold text-gray-800 text-sm leading-tight">{item.name}</p>
                                                            </div>
                                                            <div className="flex items-center gap-2">
                                                                {qtyInCart > 0 && (
                                                                    <span className="bg-blue-500 text-white text-[10px] font-bold px-2 py-0.5 rounded-md">
                                                                        {qtyInCart}x di struk
                                                                    </span>
                                                                )}
                                                                <div className="bg-white border border-blue-200 text-blue-500 p-1 rounded-lg shadow-sm flex-shrink-0">

                                            <h2 className="text-lg font-bold mb-4 flex items-center gap-2 text-gray-800 border-b pb-3">

                                                    cart.map((item) => (
                                                        <div key={item.cartId} className="flex flex-col sm:flex-row sm:items-center justify-between bg-gray-50 p-2.5 rounded-lg border border-gray-100 gap-2">
                                                            <div className="flex-1">
                                                                <p className="text-sm font-bold text-gray-800 leading-tight">{item.name}</p>
